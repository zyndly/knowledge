<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e1e28 0%, #2d2d3a 100%);
            color: white;
        }
        .og-container {
            width: 1200px;
            height: 630px;
            display: flex;
            position: relative;
            overflow: hidden;
        }
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(179, 127, 235, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(179, 127, 235, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            opacity: 0.3;
        }
        .gradient-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.2) 0%, rgba(79, 70, 229, 0.1) 100%);
            z-index: 2;
        }
        .circle-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.3), rgba(147, 51, 234, 0));
            top: -100px;
            right: -100px;
            z-index: 3;
            filter: blur(50px);
        }
        .circle-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3), rgba(59, 130, 246, 0));
            bottom: -50px;
            left: -50px;
            z-index: 3;
            filter: blur(50px);
        }
        .content {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            z-index: 5;
        }
        .logo {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
        }
        .logo img {
            width: 80px;
            height: 80px;
            margin-right: 20px;
        }
        .logo-text {
            font-size: 32px;
            font-weight: 700;
            color: #b37feb;
        }
        .title {
            font-size: 72px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 30px;
        }
        .motto {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .motto span {
            color: #b37feb;
        }
        .url {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.8);
        }
        .matrix-dots {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(179, 127, 235, 0.2) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 4;
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <div class="og-container">
        <div class="grid-bg"></div>
        <div class="gradient-overlay"></div>
        <div class="circle-1"></div>
        <div class="circle-2"></div>
        <div class="matrix-dots"></div>
        
        <div class="content">
            <div class="logo">
                <svg width="80" height="80" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="#b37feb" />
                    <text x="50" y="65" font-size="50" text-anchor="middle" fill="#ffffff" font-weight="bold">Z</text>
                </svg>
                <div class="logo-text">Zyndly Kent Baja</div>
            </div>
            <h1 class="title">A coffeeholic who code</h1>
            <div class="motto">It's hard — <span>not impossible.</span></div>
            <div class="url">zyndlybaja.com</div>
        </div>
    </div>
</body>
</html>
